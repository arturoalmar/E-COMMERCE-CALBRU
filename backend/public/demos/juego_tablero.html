<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo Tablero: El Camino del Sabio</title>
    <style>
        body { background: #10002b; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        canvas { background: #05021a; border: 2px solid #9d4edd; border-radius: 10px; margin-bottom: 20px; box-shadow: inset 0 0 30px #000; }
        .controls { display: flex; gap: 20px; align-items: center; width: 800px; justify-content: space-around;}
        button { background: #ff9e00; color: #000; font-weight: bold; padding: 10px 20px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; }
        .info { font-size: 24px; color: #00ffcc; }
    </style>
</head>
<body>
    <h2 style="color: #ffd700; margin-bottom: 10px;">Tablero Alquímico</h2>
    <canvas id="board" width="800" height="300"></canvas>
    <div class="controls">
        <button id="rollBtn" onclick="rollDice()">Tirar Dado Mágico</button>
        <div class="info">Maná: <span id="mana">10</span> | Dado: <span id="diceVal">-</span></div>
    </div>
    <div id="msg" style="margin-top: 15px; color: #ffd700; font-size: 20px; height: 30px;"></div>

    <script>
        const ctx = document.getElementById('board').getContext('2d');
        const nodes = [
            {x: 80, y: 150, c: '#555'}, {x: 180, y: 150, c: '#00ffcc'}, {x: 280, y: 80, c: '#ff3333'},
            {x: 380, y: 150, c: '#00ffcc'}, {x: 480, y: 220, c: '#ff3333'}, {x: 580, y: 150, c: '#00ffcc'},
            {x: 720, y: 150, c: '#ffd700'} // Meta
        ];
        let pos = 0; let mana = 10;

        function drawBoard() {
            ctx.clearRect(0, 0, 800, 300);
            // Dibujar líneas
            ctx.beginPath(); ctx.moveTo(nodes[0].x, nodes[0].y);
            for(let i=1; i<nodes.length; i++) ctx.lineTo(nodes[i].x, nodes[i].y);
            ctx.strokeStyle = '#9d4edd'; ctx.lineWidth = 6; ctx.stroke();
            
            // Dibujar nodos
            nodes.forEach((n, i) => {
                ctx.fillStyle = n.c; ctx.beginPath(); ctx.arc(n.x, n.y, 25, 0, Math.PI*2); ctx.fill();
            });

            // Dibujar Jugador
            ctx.fillStyle = 'white'; ctx.beginPath();
            ctx.arc(nodes[pos].x, nodes[pos].y - 35, 15, 0, Math.PI*2); ctx.fill();
        }

        function rollDice() {
            if(pos >= nodes.length -1) return;
            const roll = Math.floor(Math.random() * 3) + 1; // Dado 1-3
            document.getElementById('diceVal').innerText = roll;
            pos = Math.min(pos + roll, nodes.length - 1);
            
            // Eventos de casilla
            const color = nodes[pos].c;
            const msg = document.getElementById('msg');
            if(color === '#00ffcc') { mana += 5; msg.innerText = "¡Fuente de maná! (+5)"; }
            else if(color === '#ff3333') { mana -= 5; msg.innerText = "¡Maldición! (-5)"; }
            else if(color === '#ffd700') { msg.innerText = "¡LLEGASTE AL GRAN CALDERO!"; document.getElementById('rollBtn').disabled = true; }
            
            document.getElementById('mana').innerText = mana;
            drawBoard();
        }
        drawBoard();
    </script>
</body>
</html>
