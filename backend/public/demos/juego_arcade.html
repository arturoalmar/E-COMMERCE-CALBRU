<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo Espacial - Shooter</title>
    <style>
        body { background: #05021a; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        #canvas { border: 2px solid #8a2be2; background: #000; box-shadow: 0 0 20px #8a2be2; border-radius: 8px; }
        .hud { display: flex; justify-content: space-between; width: 800px; margin-bottom: 10px; font-family: monospace; }
        .score { font-size: 20px; color: #ffd700; font-weight: bold; }
        .controls { font-size: 16px; color: #00ffcc; }
    </style>
</head>
<body>
    <div class="hud">
        <div class="controls">Controles: ← → Mover | ESPACIO Disparar</div>
        <div class="score">Puntuación: <span id="score">0</span></div>
    </div>
    <canvas id="canvas" width="800" height="450"></canvas>
    <script>
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        let player = { x: 375, y: 390, w: 50, h: 50, speed: 8 };
        let bullets = []; let enemies = []; let score = 0; let keys = {};
        window.focus();
        window.addEventListener('click', () => window.focus());
        window.addEventListener('keydown', e => { 
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
            keys[e.key] = true; 
            if(e.key === ' ' && bullets.length < 5) { bullets.push({ x: player.x + 23, y: player.y, w: 6, h: 15 }); } 
        }); 
        window.addEventListener('keyup', e => keys[e.key] = false);
        function spawnEnemy() { if(enemies.length < 6) enemies.push({ x: Math.random() * 750, y: -40, w: 40, h: 40, speed: 1.5 }); }
        setInterval(spawnEnemy, 1500);
        function loop() {
            if(keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if(keys['ArrowRight'] && player.x < 750) player.x += player.speed;
            
            ctx.clearRect(0,0,800,450); 
            
            // Jugador
            ctx.fillStyle = '#00ffcc'; ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // Balas
            ctx.fillStyle = '#ff3333'; bullets.forEach((b,i) => { b.y -= 10; ctx.fillRect(b.x, b.y, b.w, b.h); if(b.y < -20) bullets.splice(i,1); });
            
            // Enemigos
            ctx.fillStyle = '#a14dff'; enemies.forEach((e,ei) => { e.y += e.speed; ctx.fillRect(e.x, e.y, e.w, e.h);
                if(e.y > 450) enemies.splice(ei,1);
                bullets.forEach((b,bi) => {
                    if(b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        enemies.splice(ei,1); bullets.splice(bi,1); score += 10; document.getElementById('score').innerText = score;
                    }
                });
            });
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
