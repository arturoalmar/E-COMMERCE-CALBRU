<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="galaxy" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7b1fa2;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#311b92;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sombra/Base -->
  <ellipse cx="50" cy="85" rx="30" ry="8" fill="rgba(0,0,0,0.2)" />
  
  <!-- Cuerpo del Caldero -->
  <path d="M20,40 Q20,80 50,80 Q80,80 80,40 L85,35 Q85,30 80,30 L20,30 Q15,30 15,35 Z" fill="#3e2723" stroke="#26140a" stroke-width="2"/>
  
  <!-- Interior (Galaxia) -->
  <ellipse cx="50" cy="35" rx="30" ry="10" fill="url(#galaxy)" />
  
  <!-- Brillos Galaxia -->
  <circle cx="45" cy="33" r="1" fill="white" filter="url(#glow)" />
  <circle cx="55" cy="37" r="1.5" fill="#e1f5fe" filter="url(#glow)" />
  <circle cx="50" cy="35" r="0.8" fill="#f3e5f5" filter="url(#glow)" />
  
  <!-- Símbolos (Simplificados) -->
  <path d="M45,55 L55,55 M50,50 L50,60" stroke="#ffd54f" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />
  <path d="M35,50 Q40,55 35,60" fill="none" stroke="#ffd54f" stroke-width="1" opacity="0.6" />
  
  <!-- Asas -->
  <path d="M15,40 Q5,40 5,50 Q5,60 15,60" fill="none" stroke="#3e2723" stroke-width="3" />
  <path d="M85,40 Q95,40 95,50 Q95,60 85,60" fill="none" stroke="#3e2723" stroke-width="3" />
</svg>
