<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Cauldron body -->
  <ellipse cx="100" cy="140" rx="70" ry="50" fill="#4a4a4a" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Cauldron inner shadow -->
  <ellipse cx="100" cy="135" rx="65" ry="45" fill="#2d2d2d" opacity="0.7"/>
  
  <!-- Cauldron rim -->
  <ellipse cx="100" cy="90" rx="75" ry="20" fill="#5a5a5a" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="100" cy="87" rx="70" ry="16" fill="#4a4a4a"/>
  
  <!-- Cauldron handle left -->
  <path d="M 35 95 Q 15 50 35 40" stroke="#5a5a5a" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Cauldron handle right -->
  <path d="M 165 95 Q 185 50 165 40" stroke="#5a5a5a" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Cauldron legs -->
  <ellipse cx="50" cy="185" rx="12" ry="18" fill="#4a4a4a"/>
  <ellipse cx="100" cy="190" rx="10" ry="15" fill="#4a4a4a"/>
  <ellipse cx="150" cy="185" rx="12" ry="18" fill="#4a4a4a"/>
  
  <!-- Liquid inside (glowing purple) -->
  <ellipse cx="100" cy="145" rx="60" ry="35" fill="#8b5cf6" opacity="0.6"/>
  <ellipse cx="100" cy="140" rx="58" ry="32" fill="#a78bfa" opacity="0.5"/>
  
  <!-- Glow effect -->
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  
  <ellipse cx="100" cy="145" rx="62" ry="37" fill="#8b5cf6" opacity="0.3" filter="url(#glow)"/>
  
  <!-- Magical sparkles -->
  <circle cx="85" cy="130" r="3" fill="#ffd700" opacity="0.8"/>
  <circle cx="115" cy="135" r="2" fill="#ff69b4" opacity="0.7"/>
  <circle cx="100" cy="120" r="2.5" fill="#00ffff" opacity="0.8"/>
</svg>